map $request_uri $glitchtip_cache_control {
    default "no-cache, no-store, must-revalidate, private";
    ~^/static/ "";
}

map $upstream_http_content_security_policy $glitchtip_content_security_policy {
    "" "default-src 'none'; base-uri 'none'; form-action 'none'; frame-ancestors 'none'; object-src 'none'";
    default "$upstream_http_content_security_policy; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; object-src 'none'; style-src-attr 'unsafe-inline'";
}

server {
    listen 8080;
    server_name _;
    server_tokens off;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), geolocation=(), microphone=(), payment=(), usb=()" always;
    add_header Cross-Origin-Embedder-Policy "credentialless" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;
    add_header Cache-Control $glitchtip_cache_control always;
    add_header Content-Security-Policy $glitchtip_content_security_policy always;

    location / {
        proxy_pass http://glitchtip:8000;
        proxy_hide_header Content-Security-Policy;
        proxy_hide_header Content-Security-Policy-Report-Only;
        proxy_hide_header Cross-Origin-Opener-Policy;
        proxy_hide_header Referrer-Policy;
        proxy_hide_header X-Content-Type-Options;
        proxy_hide_header X-Frame-Options;
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
